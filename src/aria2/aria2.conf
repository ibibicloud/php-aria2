
# ========== 相对路径配置（随便移动文件夹都能用） ==========
# 下载文件保存目录
dir=./下载目录
# 启动时读取已保存的任务
input-file=./aria2.session
# 退出时把当前所有任务保存到这个文件
save-session=./aria2.session
# 关闭日志文件（Windows 专用写法）
log=NUL
file-log-level=off
console-log-level=warn

# ========== 基础下载设置 ==========
# 开启断点续传
continue=true
# 不预先分配磁盘空间 小文件、机械硬盘更流畅，速度更快
file-allocation=none
# 同时最多下载 5 个任务
max-concurrent-downloads=5
# 对同一个服务器最多建立 16 个连接
max-connection-per-server=16
# 把一个文件分成 64 块 同时下载
split=64
# 每一块最小 4MB 小于 4M 的文件不拆分，避免碎片太多
min-split-size=4M

# ========== RPC 网页管理（AriaNg）无密码 ==========
# 开启远程控制接口
enable-rpc=true
# RPC 端口：6800
rpc-listen-port=6800
# 密钥（密码）
# rpc-secret=my_aria2_pwd
# 允许所有网站、所有 IP 连接 局域网 / 外网 / AriaNg 都能连
rpc-allow-origin-all=true
rpc-listen-all=true

# ========== 自动保存任务 下载完成后自动删除 .aria2 临时文件（核心） ==========
# 每30秒自动保存（防丢）防止突然断电任务丢失
save-session-interval=3
# 每20秒保存.aria2进度文件
auto-save-interval=2
# 已完成也保存（重启不消失）
force-save=false
# 关闭自动重命名 同名文件不会自动加 (1)
auto-file-renaming=false
# 允许覆盖同名文件 下载时遇到已存在文件直接覆盖
allow-overwrite=true